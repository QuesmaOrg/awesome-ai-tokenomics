name: Staleness

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  pull_request:
    paths:
      - research/manifest.json

jobs:
  staleness:
    name: Staleness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run staleness check
        run: python3 scripts/check_staleness.py
